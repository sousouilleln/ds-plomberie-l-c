# Site statique : aucun build, on publie le dossier tel quel.
[build]
  publish = "."
  functions = "netlify/functions"   # fonctions OAuth pour la connexion au CMS

# Sécurité de base
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
