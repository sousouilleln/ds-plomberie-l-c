# =====================================================================
#  Decap CMS — Configuration
#  Le client édite le contenu du site via /admin/ (login GitHub OAuth)
# =====================================================================

backend:
  name: github                              # auth GitHub directe (Identity/Git Gateway supprimés par Netlify)
  repo: sousouilleln/ds-plomberie-l-c       # dépôt source
  branch: main
  base_url: https://dsplomberieelec.netlify.app   # origine des fonctions OAuth
  auth_endpoint: .netlify/functions/auth          # fonction qui lance la connexion GitHub

# Langue de l'interface d'administration
locale: fr

# Dossier où Decap stocke les images téléversées par le client
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://dsplomberieelec.netlify.app
display_url: https://dsplomberieelec.netlify.app

collections:
  # -------------------------------------------------------------------
  #  Contenu éditable du site (fichiers uniques = type "files")
  # -------------------------------------------------------------------
  - name: "contenu"
    label: "Contenu du site"
    description: "Modifiez les textes, les images et les coordonnées du site."
    files:
      # ---------------- HERO ----------------
      - name: "hero"
        label: "1. Bannière (Hero)"
        file: "content/hero.json"
        format: json
        fields:
          - { name: "title_line1", label: "Grand titre — ligne 1", widget: "string", default: "Plomberie" }
          - { name: "title_line2", label: "Grand titre — ligne 2", widget: "string", default: "éléctricité" }
          - { name: "eyebrow", label: "Sur-titre (haut gauche)", widget: "text", hint: "Retours à la ligne autorisés", default: "Ingénierie Précise.\nExécution de Luxe." }
          - { name: "intro", label: "Texte d'introduction (haut droite)", widget: "text" }
          - { name: "image", label: "Image de fond", widget: "image", required: false, hint: "Photo de fond de la bannière" }

      # ---------------- EXPERTISES ----------------
      - name: "expertises"
        label: "2. Expertises"
        file: "content/expertises.json"
        format: json
        fields:
          - { name: "section_title", label: "Titre de la section", widget: "string", default: "Nos Expertises" }
          - { name: "section_intro", label: "Texte sous le titre", widget: "text" }
          - name: "items"
            label: "Cartes de services"
            widget: "list"
            min: 4
            max: 4
            summary: "{{fields.title}}"
            fields:
              - name: "icon"
                label: "Icône"
                widget: "select"
                hint: "Icône affichée sur la carte"
                options:
                  - { label: "Goutte d'eau (plomberie)", value: "water_drop" }
                  - { label: "Éclair (électricité)", value: "electric_bolt" }
                  - { label: "Ventilateur (CVC)", value: "mode_fan" }
                  - { label: "Outil (dépannage)", value: "build" }
                  - { label: "Robinet", value: "plumbing" }
                  - { label: "Thermostat", value: "thermostat" }
                  - { label: "Prise électrique", value: "power" }
                  - { label: "Chauffage", value: "heat_pump" }
              - { name: "title", label: "Titre de la carte", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }

      # ---------------- POURQUOI NOUS ----------------
      - name: "reliability"
        label: "3. Pourquoi nous choisir"
        file: "content/reliability.json"
        format: json
        fields:
          - { name: "eyebrow", label: "Sur-titre", widget: "string", default: "Fondations Solides" }
          - { name: "title", label: "Titre de la section", widget: "string", default: "Pourquoi Nous Choisir ?" }
          - { name: "intro", label: "Paragraphe d'introduction", widget: "text" }
          - { name: "image", label: "Image de la section", widget: "image", required: false }
          - name: "stats"
            label: "Atouts (4 blocs)"
            widget: "list"
            min: 4
            max: 4
            summary: "{{fields.title}}"
            fields:
              - name: "icon"
                label: "Icône"
                widget: "select"
                options:
                  - { label: "Badge vérifié", value: "verified" }
                  - { label: "Ancienneté / historique", value: "history" }
                  - { label: "Fabrication de précision", value: "precision_manufacturing" }
                  - { label: "Support / conseil", value: "support_agent" }
                  - { label: "Médaille d'excellence", value: "workspace_premium" }
                  - { label: "Bouclier / garantie", value: "shield" }
                  - { label: "Ingénierie", value: "engineering" }
                  - { label: "Poignée de main", value: "handshake" }
                  - { label: "Économies", value: "savings" }
                  - { label: "Écologie", value: "eco" }
              - { name: "title", label: "Titre", widget: "string" }
              - { name: "description", label: "Description", widget: "text" }
          - { name: "overlay_title", label: "Encart — titre", widget: "string", default: "Précision Absolue" }
          - { name: "overlay_subtitle", label: "Encart — sous-titre", widget: "string", default: "Tolérance Zéro" }
          - { name: "overlay_text", label: "Encart — texte", widget: "text" }

      # ---------------- CONTACT ----------------
      - name: "contact"
        label: "4. Contact"
        file: "content/contact.json"
        format: json
        fields:
          - { name: "eyebrow", label: "Sur-titre", widget: "string", default: "Démarrer un projet" }
          - { name: "title", label: "Titre de la section", widget: "text", hint: "Retours à la ligne autorisés", default: "Parlons de votre\ninstallation." }
          - { name: "intro", label: "Texte d'introduction", widget: "text" }
          - { name: "address", label: "Adresse physique", widget: "text", hint: "Retours à la ligne autorisés" }
          - { name: "phone", label: "Numéro de téléphone", widget: "string" }
          - { name: "email", label: "Adresse email", widget: "string" }
